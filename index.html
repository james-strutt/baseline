<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F4EC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A2A1C" media="(prefers-color-scheme: dark)" />
    <script>
      /* Set the evening-Centre-Court theme before first paint — no 4am white flash. */
      (function () {
        try {
          var mode = localStorage.getItem('baseline-theme') || 'system';
          var dark =
            mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Baseline" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="description"
      content="Baseline — never miss a ball. Live tennis scores across ATP, WTA, Challenger and ITF, organised around the players you love, in your own time zone."
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600&family=Libre+Caslon+Display&family=Spline+Sans+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Baseline — Never miss a ball</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
